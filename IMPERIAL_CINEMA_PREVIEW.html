<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPERIAL CINEMA // PREVIEW</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --cyan: #00f2ff;
            --bg: #050505;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .cinema-container {
            width: 90vw;
            height: 80vh;
            border: 2px solid var(--gold);
            position: relative;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            overflow: hidden;
            background: #000;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.2);
        }

        .overlay {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 80%;
            pointer-events: none;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: glitch 3s infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--cyan);
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="cinema-container">
        <div class="scanline"></div>
        
        <div class="controls">
            <button class="btn" onclick="prevSlide()">PREV</button>
            <button class="btn" onclick="nextSlide()">NEXT</button>
        </div>

        <!-- Slide 1: Awakening -->
        <div class="slide active" id="slide-0">
            <img src="file:///C:/Users/StabX/.gemini/antigravity/brain/b4e8be6a-278a-45f6-acdd-cb121c73696c/lia_eye_awakening_v2_1777533371126.png" alt="Awakening">
            <div class="overlay">
                <div class="title" data-text="AWAKENING">AWAKENING</div>
                <div class="subtitle">Neural Core Initialization // Phase 1</div>
            </div>
        </div>

        <!-- Slide 2: Swarm -->
        <div class="slide" id="slide-1">
            <img src="file:///C:/Users/StabX/.gemini/antigravity/brain/b4e8be6a-278a-45f6-acdd-cb121c73696c/dubai_swarm_visualization_1777533410694.png" alt="Swarm">
            <div class="overlay">
                <div class="title" data-text="THE SWARM">THE SWARM</div>
                <div class="subtitle">ABO Agency // Dubai Sector Domination</div>
            </div>
        </div>

        <!-- Slide 3: Throne -->
        <div class="slide" id="slide-2">
            <img src="file:///C:/Users/StabX/.gemini/antigravity/brain/b4e8be6a-278a-45f6-acdd-cb121c73696c/master_command_center_lia_1777533483569.png" alt="Throne">
            <div class="overlay">
                <div class="title" data-text="MASTER CONFIG">MASTER CONFIG</div>
                <div class="subtitle">One Mind. Infinite Power.</div>
            </div>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (n + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // Auto play simulation
        // setInterval(nextSlide, 5000);
    </script>
</body>
</html>
