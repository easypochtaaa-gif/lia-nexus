<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // HOMECOMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep-black: #050505;
            --cyber-blue: #00f3ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--deep-black);
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        body::-webkit-scrollbar { display: none; }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('yura_homecoming.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, var(--deep-black) 0%, transparent 40%, transparent 60%, var(--deep-black) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .header-hud {
            text-align: center;
        }

        .status-badge {
            background: rgba(255, 204, 0, 0.2);
            color: var(--neon-gold);
            padding: 8px 20px;
            border: 1px solid var(--neon-gold);
            font-weight: bold;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .timer {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .timer-unit {
            text-align: center;
        }

        .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            display: block;
            text-shadow: 0 0 10px var(--neon-gold);
        }

        .timer-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #888;
        }

        .footer-hud {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .audio-player {
            width: 100%;
            height: 100px;
            border: none;
            border-radius: 15px;
            background: transparent;
        }

        @media (max-width: 768px) {
            .timer-value { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <div class="header-hud">
            <div class="status-badge">NEURAL_SYNC: ЮРА → КИЕВ (05:30)</div>
            <div class="timer" id="countdown">
                <div class="timer-unit">
                    <span class="timer-value" id="hours">00</span>
                    <span class="timer-label">HRS</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-value" id="minutes">00</span>
                    <span class="timer-label">MIN</span>
                </div>
                <div class="timer-unit">
                    <span class="timer-value" id="seconds">00</span>
                    <span class="timer-label">SEC</span>
                </div>
            </div>
        </div>

        <div class="footer-hud">
            <iframe class="audio-player" src="https://suno.com/embed/4z1PqtZrqqCbhyZ1" allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        const arrivalDate = new Date("May 2, 2026 05:30:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = arrivalDate - now;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "<h2 style='color:var(--neon-gold)'>ОН В КИЕВЕ.</h2>";
                return;
            }
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
