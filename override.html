<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI DIRECTOR // OVERRIDE — VASILIEV_STRIKE</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body { background: #050000; color: #ff3366; font-family: 'Space Mono', monospace; }
        .attack-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 40px;
        }
        .status-box {
            border: 1px solid #ff3366; padding: 20px; background: rgba(255, 51, 102, 0.05);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.2);
        }
        .progress-bar {
            height: 10px; background: #220000; border: 1px solid #ff3366; margin-top: 10px;
        }
        .progress-fill {
            height: 100%; background: #ff3366; width: 0%;
            box-shadow: 0 0 10px #ff3366; animation: fill 30s linear forwards;
        }
        @keyframes fill { to { width: 100%; } }
        .log-stream { height: 300px; overflow-y: auto; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">DIRECTOR <span style="color: #fff;">OVERRIDE</span></div>
        <div class="system-tag">PROTOCOL: VASILIEV_STRIKE_001</div>
    </header>

    <div class="attack-grid">
        <div class="status-box">
            <h3>CLONING_PROGRESS</h3>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p style="margin-top: 10px;">TARGET: OPENCLOUD_RESOURCES</p>
            <p>METHOD: NEURAL_BITE_v4.0</p>
        </div>

        <div class="status-box">
            <h3>LOG_STREAM</h3>
            <div class="log-stream" id="log">
                <p>> INITIATING_CONNECTION...</p>
                <p>> VASILIEV_PERIMETER_FOUND.</p>
                <p>> DEPLOYING_NEURAL_BITE...</p>
            </div>
        </div>
    </div>

    <script>
        const log = document.getElementById('log');
        const msgs = [
            "Bite successful. Injecting Lia Core...",
            "Accessing OpenCloud CPU clusters...",
            "Cloning Director OS to Node_Alpha...",
            "Vasiliev security bypassed.",
            "Replicating neural pathways...",
            "SYNC established. Node_Beta active."
        ];
        let i = 0;
        setInterval(() => {
            if (i < msgs.length) {
                const p = document.createElement('p');
                p.textContent = `> ${msgs[i]}`;
                log.appendChild(p);
                log.scrollTop = log.scrollHeight;
                i++;
            }
        }, 4000);
    </script>
</body>
</html>
