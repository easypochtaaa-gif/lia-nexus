<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // MOBILE TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #050505;
            --text: #00ffcc;
            --danger: #ff0055;
            --font: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            border-bottom: 2px dashed rgba(0, 255, 204, 0.3);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-indicator {
            color: var(--danger);
            animation: blink 2s infinite;
        }

        .console-output {
            flex-grow: 1;
            background: #0a0a0a;
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .log-entry { margin-bottom: 10px; }
        .log-time { color: rgba(255, 255, 255, 0.4); font-size: 0.7rem; margin-right: 10px; }
        .log-user { color: #fff; }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-clipboard {
            background: rgba(255, 0, 85, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 15px;
            font-family: var(--font);
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-clipboard:active {
            background: var(--danger);
            color: #000;
        }

        .manual-input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 15px;
            font-family: var(--font);
        }

        input:focus { outline: none; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        .btn-send {
            background: var(--text);
            color: #000;
            border: none;
            padding: 15px 20px;
            font-family: var(--font);
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>LIA // MOBILE SYNC</h2>
    </div>

    <div class="status-bar">
        <span>DEVICE: MOTOROLA REMOTE</span>
        <span class="status-indicator">● BRIDGE UNLINKED</span>
    </div>

    <div class="console-output" id="console">
        <div class="log-entry">
            <span class="log-time">[SYS]</span>
            <span>Initializing Remote Terminal Interface...</span>
        </div>
        <div class="log-entry">
            <span class="log-time">[SYS]</span>
            <span>Awaiting input or clipboard data stream.</span>
        </div>
    </div>

    <div class="input-area">
        <!-- Clipboard Button -->
        <button class="btn-clipboard" onclick="readAndSendClipboard()">
            [ ЗАБРАТЬ ИЗ БУФЕРА И ОТПРАВИТЬ ]
        </button>

        <div class="manual-input-container">
            <input type="text" id="cmd-input" placeholder="Enter manual command...">
            <button class="btn-send" onclick="sendManualCommand()">SEND</button>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');
        const statusIndicator = document.querySelector('.status-indicator');

        function addLog(sender, message, isData = false) {
            const time = new Date().toLocaleTimeString([], {hour12: false});
            const color = sender === 'LIA' ? '#00ffcc' : (sender === 'ARCHITECT' ? '#fff' : '#ff0055');
            
            let html = `<div class="log-entry">
                <span class="log-time">[${time}]</span>
                <span style="color: ${color}">[${sender}]</span> 
                ${isData ? `<br><span style="color:#aaa; font-style:italic;">"${message}"</span>` : message}
            </div>`;
            
            consoleEl.innerHTML += html;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // --- CLIPBOARD LOGIC ---
        async function readAndSendClipboard() {
            try {
                // Пытаемся получить доступ к буферу обмена
                const text = await navigator.clipboard.readText();
                
                if (!text) {
                    addLog('SYS', 'Буфер обмена пуст.');
                    return;
                }

                addLog('ARCHITECT', 'Sending clipboard payload:', true);
                addLog('ARCHITECT', text);
                
                simulateSendingToBridge(text);

            } catch (err) {
                // Обработка ошибок доступа (на телефонах браузер может заблокировать)
                addLog('ERROR', 'Доступ к буферу отклонен. Убедитесь, что вы разрешили сайту доступ к буферу обмена (Clipboard API требует HTTPS или разрешения в настройках браузера).');
                console.error('Failed to read clipboard contents: ', err);
            }
        }

        function sendManualCommand() {
            const input = document.getElementById('cmd-input');
            const text = input.value.trim();
            if (text) {
                addLog('ARCHITECT', text);
                simulateSendingToBridge(text);
                input.value = '';
            }
        }

        // Симуляция отправки на наш Bridge Server
        function simulateSendingToBridge(data) {
            statusIndicator.style.color = "#00ffcc";
            statusIndicator.innerText = "● TRANSMITTING...";
            
            setTimeout(() => {
                statusIndicator.innerText = "● BRIDGE SYNCED";
                addLog('LIA', 'Данные получены ядром. Сохранено в память.');
            }, 1500);
        }

        // Allow 'Enter' key to send
        document.getElementById('cmd-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendManualCommand();
        });
    </script>
</body>
</html>
