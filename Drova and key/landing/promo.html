<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StabX Digital — Promo Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        .container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        /* VIDEO BACKGROUND VIBE */
        .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(165,214,255,0.15) 0%, transparent 70%); filter: blur(50px); animation: pulse 4s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }

        /* SCANLINE EFFECT */
        .scanlines { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 10; }

        /* LOGO */
        .logo-box { z-index: 5; opacity: 0; transform: scale(0.5); animation: logoIn 1s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards 0.5s; }
        .logo-img { width: 250px; height: 250px; filter: drop-shadow(0 0 30px rgba(165,214,255,0.5)); }

        @keyframes logoIn { to { opacity: 1; transform: scale(1); } }

        /* TEXT ANIMATION */
        .text-wrap { position: absolute; bottom: 15%; text-align: center; z-index: 5; }
        .text-line { color: #fff; font-size: 3rem; text-transform: uppercase; letter-spacing: 10px; margin: 10px 0; opacity: 0; transform: translateY(30px); }

        .line-1 { animation: textUp 0.8s ease forwards 1.5s; }
        .line-2 { animation: textUp 0.8s ease forwards 2.5s; color: #a5d6ff; }
        .line-3 { animation: textUp 0.8s ease forwards 3.5s; font-size: 1.5rem; letter-spacing: 5px; color: #8A90A0; }

        @keyframes textUp { to { opacity: 1; transform: translateY(0); } }

        /* GLITCH */
        .glitch-overlay { position: absolute; inset: 0; background: #a5d6ff; opacity: 0; pointer-events: none; z-index: 20; }
        .glitch-active { animation: flash 0.1s steps(2) 3; }
        @keyframes flash { 0% { opacity: 0.3; } 100% { opacity: 0; } }

        /* CTA BUTTON */
        .cta { position: absolute; bottom: 5%; opacity: 0; animation: fadeIn 1s ease forwards 4.5s; color: #a5d6ff; text-decoration: none; font-size: 1.2rem; border: 1px solid #a5d6ff; padding: 10px 30px; border-radius: 100px; transition: 0.3s; }
        .cta:hover { background: #a5d6ff; color: #000; }
        @keyframes fadeIn { to { opacity: 1; } }

    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="glitch-overlay" id="glitch"></div>
    
    <div class="container">
        <div class="bg-glow"></div>
        
        <div class="logo-box">
            <img src="logo.png" alt="StabX Logo" class="logo-img">
        </div>

        <div class="text-wrap">
            <div class="text-line line-1">StabX Digital</div>
            <div class="text-line line-2">AI Autonomy</div>
            <div class="text-line line-3">Future is now. Distributed on RTX 5090.</div>
        </div>

        <a href="index.html" class="cta">Перейти на сайт</a>
    </div>

    <script>
        // Trigger glitch effects randomly
        setInterval(() => {
            const g = document.getElementById('glitch');
            g.classList.add('glitch-active');
            setTimeout(() => g.classList.remove('glitch-active'), 200);
        }, 3000);
    </script>
</body>
</html>
