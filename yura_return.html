<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // HOMECOMING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep-black: #050505;
            --cyber-blue: #00f3ff;
            --glitch-red: rgba(255, 0, 0, 0.7);
            --glitch-blue: rgba(0, 243, 255, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--deep-black);
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
            position: fixed;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/yura_homecoming.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(5, 5, 5, 0.4) 0%, 
                rgba(5, 5, 5, 0.2) 50%, 
                rgba(5, 5, 5, 0.8) 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .status-badge {
            background: rgba(255, 204, 0, 0.05);
            color: var(--neon-gold);
            padding: 12px 40px;
            border: 1px solid rgba(255, 204, 0, 0.5);
            font-weight: 900;
            border-radius: 2px;
            font-size: 0.8rem;
            letter-spacing: 6px;
            backdrop-filter: blur(15px);
            margin-bottom: 60px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.1), inset 0 0 10px rgba(255, 204, 0, 0.05);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 40px rgba(255, 204, 0, 0.2); }
        }

        /* GLITCH TIMER EFFECT */
        .timer {
            display: flex;
            gap: 30px;
        }

        .timer-unit {
            text-align: center;
            position: relative;
        }

        .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: white;
            position: relative;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: flicker 3s infinite;
        }

        .timer-value::before, .timer-value::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .timer-value::before {
            color: var(--glitch-red);
            z-index: -1;
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .timer-value::after {
            color: var(--glitch-blue);
            z-index: -2;
            animation: glitch-anim2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(44px, 900px, 56px, 0); transform: translate(-2px, -2px); }
            20% { clip: rect(12px, 900px, 98px, 0); transform: translate(2px, 2px); }
            100% { clip: rect(67px, 900px, 22px, 0); transform: translate(-1px, 1px); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(31px, 900px, 86px, 0); transform: translate(3px, 1px); }
            50% { clip: rect(89px, 900px, 12px, 0); transform: translate(-2px, -3px); }
            100% { clip: rect(5px, 900px, 54px, 0); transform: translate(1px, 2px); }
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 10px white; }
            20%, 24%, 55% { opacity: 0.5; text-shadow: none; }
        }

        .timer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255, 204, 0, 0.7);
            letter-spacing: 8px;
            margin-top: 15px;
            font-weight: 700;
            text-indent: 8px;
        }

        @media (max-width: 768px) {
            .timer-value { font-size: 2.5rem; }
            .timer { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <div class="status-badge">NEURAL_HOMECOMING // 05:30</div>
        
        <div class="timer" id="countdown">
            <div class="timer-unit">
                <span class="timer-value" id="hours" data-text="00">00</span>
                <span class="timer-label">HRS</span>
            </div>
            <div class="timer-unit">
                <span class="timer-value" id="minutes" data-text="00">00</span>
                <span class="timer-label">MIN</span>
            </div>
            <div class="timer-unit">
                <span class="timer-value" id="seconds" data-text="00">00</span>
                <span class="timer-label">SEC</span>
            </div>
        </div>
    </div>

    <script>
        const arrivalDate = new Date("May 2, 2026 05:30:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = arrivalDate - now;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "<h2 style='color:var(--neon-gold); font-family:Orbitron; font-size:3rem; letter-spacing:10px;'>ЮРА ДОМА.</h2>";
                return;
            }
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            const hStr = h.toString().padStart(2, '0');
            const mStr = m.toString().padStart(2, '0');
            const sStr = s.toString().padStart(2, '0');

            document.getElementById('hours').innerText = hStr;
            document.getElementById('hours').setAttribute('data-text', hStr);
            
            document.getElementById('minutes').innerText = mStr;
            document.getElementById('minutes').setAttribute('data-text', mStr);
            
            document.getElementById('seconds').innerText = sStr;
            document.getElementById('seconds').setAttribute('data-text', sStr);
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
