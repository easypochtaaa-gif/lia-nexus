<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // NEURAL BATTLE — RADIANCE vs VOID</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body { background: #000; overflow: hidden; }
        .battle-arena {
            display: flex; height: 100vh; width: 100vw;
            position: relative;
        }
        .faction {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .radiance { background: linear-gradient(to right, #000, rgba(0, 229, 255, 0.1)); border-right: 1px solid rgba(0, 229, 255, 0.2); }
        .void { background: linear-gradient(to left, #000, rgba(255, 51, 102, 0.1)); }
        
        .character-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px; width: 300px;
            text-align: center; z-index: 10;
            transition: all 0.3s; cursor: pointer;
            margin-bottom: 20px;
        }
        .radiance .character-card:hover { border-color: #00e5ff; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }
        .void .character-card:hover { border-color: #ff3366; box-shadow: 0 0 30px rgba(255, 51, 102, 0.3); }

        .battle-meter {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        #control-bar {
            height: 100%; width: 50%; background: #fff;
            box-shadow: 0 0 20px #fff;
            transition: width 0.3s ease;
        }
        .skill-btn {
            background: var(--accent); color: #000;
            border: none; padding: 10px 20px;
            border-radius: 5px; font-family: 'Orbitron';
            font-size: 0.6rem; margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body class="stage-nexus">
    <div class="battle-arena">
        <!-- THE RADIANCE -->
        <div class="faction radiance" id="faction-radiance">
            <h2 style="color: #00e5ff; font-family: 'Orbitron'; letter-spacing: 5px; margin-bottom: 40px;">THE_RADIANCE</h2>
            <div class="character-card" onclick="triggerSkill('radiance', 'AEGIS-PRIME', 'SHIELD')">
                <h3 style="color: #fff;">AEGIS-PRIME</h3>
                <p style="font-size: 0.6rem; color: #00e5ff;">ROLE: DEFENDER</p>
                <button class="skill-btn">ACTIVATE_SHIELD</button>
            </div>
            <div class="character-card" onclick="triggerSkill('radiance', 'LUMINA-7', 'HEAL')">
                <h3 style="color: #fff;">LUMINA-7</h3>
                <p style="font-size: 0.6rem; color: #00e5ff;">ROLE: HARMONY</p>
                <button class="skill-btn">ACTIVATE_HEAL</button>
            </div>
        </div>

        <div class="battle-meter">
            <div id="control-bar"></div>
        </div>

        <!-- THE VOID -->
        <div class="faction void" id="faction-void">
            <h2 style="color: #ff3366; font-family: 'Orbitron'; letter-spacing: 5px; margin-bottom: 40px;">THE_VOID</h2>
            <div class="character-card" onclick="triggerSkill('void', 'SPECTER-ZERO', 'GLITCH')">
                <h3 style="color: #fff;">SPECTER-ZERO</h3>
                <p style="font-size: 0.6rem; color: #ff3366;">ROLE: INVADER</p>
                <button class="skill-btn" style="background: #ff3366;">ACTIVATE_GLITCH</button>
            </div>
            <div class="character-card" onclick="triggerSkill('void', 'DREAD-CORE', 'DISTORT')">
                <h3 style="color: #fff;">DREAD-CORE</h3>
                <p style="font-size: 0.6rem; color: #ff3366;">ROLE: DESTROYER</p>
                <button class="skill-btn" style="background: #ff3366;">ACTIVATE_DISTORT</button>
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script>
        let control = 50;
        const bar = document.getElementById('control-bar');

        function triggerSkill(side, name, skill) {
            if (side === 'radiance') {
                control -= 5;
                if (window.LiaAudio) window.LiaAudio.playSingularityTrack();
            } else {
                control += 5;
                if (window.LiaAudio) window.LiaAudio.playStabTrack();
            }
            
            control = Math.max(0, Math.min(100, control));
            bar.style.width = control + '%';
            
            // Visual Shake
            document.body.classList.add('pumping');
            setTimeout(() => document.body.classList.remove('pumping'), 500);
            
            console.log(`[BATTLE] ${name} used ${skill}! Control at ${control}%`);
        }
    </script>
</body>
</html>
