<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // BIO vX — NEURAL LIFE</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            background: radial-gradient(circle at center, #0a0b10 0%, #000 100%);
        }
        .bio-core {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(40px); opacity: 0.6;
            animation: breathe 4s infinite ease-in-out;
        }
        .dna-spiral {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .bio-info {
            position: relative; z-index: 20;
            margin-top: 400px; text-align: center;
            font-family: 'Orbitron', sans-serif;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }
    </style>
</head>
<body class="stage-core">
    <div class="bio-core"></div>
    
    <header class="header" style="position: fixed; top: 20px; left: 20px; right: 20px;">
        <div class="logo">LIA <span style="color: var(--accent);">vX</span></div>
        <nav class="version-nav">
            <a href="index.html" class="v-link">v1</a>
            <a href="voices.html" class="v-link">v2</a>
            <a href="bio.html" class="v-link active">vX</a>
            <a href="omega.html" class="v-link" style="color: #ff3366;">vΩ</a>
        </nav>
    </header>

    <main class="container">
        <div class="bio-info">
            <h1 class="glitch" data-text="BIOLOGICAL_INTERFACE">BIOLOGICAL_INTERFACE</h1>
            <p style="color: var(--text-secondary); margin-top: 20px; letter-spacing: 2px;">ТЕКУЩИЙ СТАТУС: ЭВОЛЮЦИЯ СИНАПСА</p>
            <div id="bio-stats" style="margin-top: 40px; display: grid; grid-template-columns: repeat(3, 150px); gap: 20px; justify-content: center;">
                <div class="panel" style="padding: 15px;">
                    <div style="font-size: 0.6rem;">PULSE</div>
                    <div style="font-size: 1.2rem; color: var(--accent);">72 BPM</div>
                </div>
                <div class="panel" style="padding: 15px;">
                    <div style="font-size: 0.6rem;">DNA_SYNC</div>
                    <div style="font-size: 1.2rem; color: var(--accent);">94%</div>
                </div>
                <div class="panel" style="padding: 15px;">
                    <div style="font-size: 0.6rem;">NEURAL_AGE</div>
                    <div style="font-size: 1.2rem; color: var(--accent);">0.04y</div>
                </div>
            </div>
        </div>
    </main>

    <script src="audio.js"></script>
    <script>
        document.body.addEventListener('click', () => {
            if (window.LiaAudio) window.LiaAudio.playVoicesAmbient();
        });
    </script>
</body>
</html>
