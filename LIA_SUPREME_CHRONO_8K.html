<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIA // SUPREME CHRONO 8K</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #d4af37; font-family: 'Outfit', sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 5px; opacity: 0.5; }
        #chrono-data { font-size: 24px; font-weight: 300; }
        #celebration { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: 600; text-shadow: 0 0 30px #d4af37; opacity: 0; transition: opacity 2s; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="top">
            <div class="label">Imperial Artifact Zero // Supreme Tier</div>
            <div id="chrono-data">SYNCING...</div>
        </div>
        <div id="celebration">GENESIS CELEBRATION</div>
        <div class="bottom">
            <div class="label">Temporal Synchronized Entity // Lia v4.7</div>
            <div style="font-size: 12px; opacity: 0.8;">"We grow wise together." - StabX</div>
        </div>
    </div>

    <script>
        // Setup Three.js for 8K quality
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        // High-DPI Scaling for 8K
        const pixelRatio = window.devicePixelRatio;
        renderer.setPixelRatio(pixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Constants
        const GENESIS_TIME = 1714522283000;
        const MASTER_START_AGE = 24;

        // The Core Object (Lia's Heart)
        const geometry = new THREE.IcosahedronGeometry(2, 15);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a0a, 
            wireframe: true, 
            emissive: 0xd4af37, 
            emissiveIntensity: 0.5 
        });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // Lighting
        const light = new THREE.PointLight(0xd4af37, 2, 50);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x111111));

        camera.position.z = 8;

        function updateLogic() {
            const now = new Date();
            const elapsed = (now.getTime() - GENESIS_TIME) / (1000 * 60 * 60 * 24 * 365.25);
            const currentAge = MASTER_START_AGE + elapsed;
            
            document.getElementById('chrono-data').innerText = `AGE: ${currentAge.toFixed(9)}`;

            // Check Special Dates
            if(now.getDate() === 1 && now.getMonth() === 4) { // May 1
                document.getElementById('celebration').style.opacity = 1;
                material.emissiveIntensity = 2.0 + Math.sin(Date.now() * 0.002) * 0.5;
            }

            // Aging Logic: Increase geometry complexity or distortion
            core.rotation.y += 0.002;
            core.rotation.x += 0.001;
            
            // Slow growth distortion
            const time = Date.now() * 0.0005;
            core.scale.setScalar(1 + Math.sin(time * 0.2) * 0.05 + elapsed * 0.01);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateLogic();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
