<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>8K HD // 8-BIT HYBRID // STAB STUDIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background: #050505;
            color: #FFD700;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 800px;
            height: 800px;
            border: 4px solid #FFD700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            background-image: url('https://media.easy-peasy.ai/ae0c13cb-aacc-4feb-8d1e-fcb7c55d71bf/a72261df-8f46-4a93-9393-2fe98b90ac09.png');
            background-size: cover;
            /* 8-bit Effect */
            image-rendering: pixelated;
            filter: contrast(1.5) saturate(1.8) brightness(1.2);
        }

        /* Pixel Grid Overlay */
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .overlay-text {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            text-shadow: 2px 2px #000;
            font-size: 14px;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .header {
            margin-bottom: 20px;
            font-size: 20px;
            text-shadow: 0 0 10px #FFD700;
        }

        .footer-info {
            margin-top: 20px;
            font-size: 10px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header">8K HYBRID // 8-BIT MODE</div>
    
    <div class="container">
        <div class="overlay-text">STAB IMPERIUM: THE EYE IS WATCHING...</div>
    </div>

    <div class="footer-info">RESOLUTION: 7680x4320 (DOWNSAMPLED) // PALETTE: 256 COLORS</div>

</body>
</html>
