<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYIV NEURAL NEXUS // Storefront Registry</title>
  <link rel="stylesheet" href="ukraine_shops.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Additional inline styles for new features */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
    }
    .filter-btn.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
      box-shadow: var(--glow-shadow);
    }
    .search-container {
      max-width: 600px;
      margin: 0 auto 3rem;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 15px 25px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    .search-input:focus {
      border-color: var(--accent-secondary);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }
    .platform-tag {
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--accent-secondary);
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Kyiv Storefronts</h1>
      <p class="subtitle">SYNAPSE CORE // AGGREGATED VITRINES</p>
    </header>

    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию магазина...">
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-platform="all">Все шопы</button>
      <button class="filter-btn" data-platform="LabRC">LabRC</button>
      <button class="filter-btn" data-platform="Legalizer">Legalizer</button>
      <button class="filter-btn" data-platform="BMWRC">BMWRC</button>
      <button class="filter-btn" data-platform="Amor">Amor</button>
    </div>

    <div class="shop-grid" id="shopGrid">
      <!-- Shops will be rendered here by JS -->
    </div>
  </div>

  <script>
    // БАЗА ДАННЫХ МАГАЗИНОВ (Редактируй здесь)
    const shops = [
      {
        name: "VisaWhite",
        platform: "LabRC",
        desc: "Премиальный VIP-сервис на LabRC. Специализация на оптовых и розничных поставках. Высокая надежность.",
        web: "https://labrc.to/forums/visawhite/",
        bot: "https://t.me/visawhite_official_bot",
        status: "Online"
      },
      {
        name: "Narkopump",
        platform: "Legalizer",
        desc: "Один из крупнейших автоматизированных шопов на Legalizer. Огромная сеть по всему Киеву.",
        web: "https://www.legalizer.biz/forums/Narkopump/",
        bot: "https://t.me/narkopump_store_bot",
        status: "Online"
      },
      {
        name: "Amigo",
        platform: "LabRC",
        desc: "Киевский топ-селлер. Известен стабильной работой и качественным сервисом на протяжении лет.",
        web: "https://labrc.to/forums/amigo/",
        bot: "https://t.me/amigo_kyiv_bot",
        status: "Online"
      },
      {
        name: "Pirat Salim",
        platform: "Legalizer",
        desc: "Легендарный шоп с Legalizer. Огромный ассортимент и собственная система лояльности.",
        web: "https://www.legalizer.biz/forums/PiratSalim/",
        bot: "https://t.me/pirat_salim_bot",
        status: "Online"
      },
      {
        name: "AmfHouse",
        platform: "BMWRC",
        desc: "Сетевой гигант, представленный на BMWRC и LabRC. Широкая география по столице.",
        web: "https://bmwrc.io/forums/amfhouse/",
        bot: "https://t.me/amfhouse_delivery_bot",
        status: "Online"
      },
      {
        name: "PinkPanter",
        platform: "Amor",
        desc: "Эксклюзивный партнер площадки Amor. Высокие стандарты анонимности и сервиса.",
        web: "https://amor.gg/forums/pinkpanter/",
        bot: "https://t.me/pink_panter_bot",
        status: "Online"
      },
      {
        name: "Benetton",
        platform: "LabRC",
        desc: "VIP-магазин с отличной репутацией на LabRC. Стабильное наличие и качество.",
        web: "https://labrc.to/forums/benetton/",
        bot: "https://t.me/benetton_family_bot",
        status: "Online"
      },
      {
        name: "Kvazimixer",
        platform: "Legalizer",
        desc: "Технологичный шоп с Legalizer. Собственные разработки систем выдачи и мониторинга.",
        web: "https://www.legalizer.biz/forums/Kvazimixer/",
        bot: "https://t.me/kvazi_mixer_bot",
        status: "Offline"
      },
      {
        name: "Bonaqua",
        platform: "LabRC",
        desc: "Надежный поставщик с LabRC. Специализация на чистых продуктах и быстром сервисе.",
        web: "https://labrc.to/forums/bonaqua/",
        bot: "https://t.me/bonaqua_shop_bot",
        status: "Online"
      },
      {
        name: "Pryanik",
        platform: "BMWRC",
        desc: "Шоп с акцентом на сервис и поддержку клиентов. Активен на BMWRC.",
        web: "https://bmwrc.io/forums/pryanik/",
        bot: "https://t.me/pryanik_kyiv_bot",
        status: "Online"
      },
      {
        name: "AllHim",
        platform: "Legalizer",
        desc: "Универсальный поставщик, представленный на всех крупных площадках. Масштабная сеть.",
        web: "https://www.legalizer.biz/forums/AllHim/",
        bot: "https://t.me/allhim_official_bot",
        status: "Online"
      },
      {
        name: "Poplavsky",
        platform: "Legalizer",
        desc: "Популярный молодежный шоп с креативным подходом и стабильной работой.",
        web: "https://www.legalizer.biz/forums/Poplavsky/",
        bot: "https://t.me/poplavsky_shop_bot",
        status: "Online"
      }
    ];

    const shopGrid = document.getElementById('shopGrid');
    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.querySelectorAll('.filter-btn');

    function renderShops(filter = 'all', query = '') {
      shopGrid.innerHTML = '';
      
      const filtered = shops.filter(shop => {
        const matchesFilter = filter === 'all' || shop.platform === filter;
        const matchesQuery = shop.name.toLowerCase().includes(query.toLowerCase());
        return matchesFilter && matchesQuery;
      });

      filtered.forEach(shop => {
        const card = document.createElement('div');
        card.className = 'shop-card';
        card.innerHTML = `
          <div class="status-badge" style="color: ${shop.status === 'Online' ? '#22c55e' : '#ef4444'}">
            ${shop.status}
          </div>
          <span class="platform-tag">SOURCE: ${shop.platform.toUpperCase()}</span>
          <h2 class="shop-name">${shop.name}</h2>
          <p class="shop-desc">${shop.desc}</p>
          <div class="actions">
            <a href="${shop.web}" target="_blank" class="btn btn-web">🌐 Витрина</a>
            <a href="${shop.bot}" target="_blank" class="btn btn-tg">🤖 Бот магазина</a>
          </div>
        `;
        shopGrid.appendChild(card);
      });
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => {
      const activeFilter = document.querySelector('.filter-btn.active').dataset.platform;
      renderShops(activeFilter, e.target.value);
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderShops(btn.dataset.platform, searchInput.value);
      });
    });

    // Initial Render
    renderShops();
  </script>
</body>
</html>
